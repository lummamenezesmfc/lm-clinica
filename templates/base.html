<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LM Clínica</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
    nav { background: #6c3fc5; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 32px; }
    nav .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
    nav a { color: white; text-decoration: none; font-size: 0.95rem; opacity: 0.85; }
    nav a:hover { opacity: 1; }
    .container { max-width: 960px; margin: 40px auto; padding: 0 24px; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; color: #222; }
    h2 { font-size: 1.2rem; margin-bottom: 16px; color: #444; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #6c3fc5; color: white; }
    .btn-primary:hover { background: #5a32a8; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    th { font-weight: 600; color: #666; background: #fafafa; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .badge-red { background: #fee2e2; color: #b91c1c; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    form label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; color: #555; }
    form input, form select, form textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; }
    form input:focus, form select:focus { outline: none; border-color: #6c3fc5; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat .value { font-size: 1.8rem; font-weight: 700; color: #6c3fc5; }
    .stat .label { font-size: 0.85rem; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">LM Clínica</span>
    <a href="/">Dashboard</a>
    <a href="/pacientes">Pacientes</a>
    <a href="/agenda">Agenda</a>
    <a href="/financeiro">Financeiro</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
