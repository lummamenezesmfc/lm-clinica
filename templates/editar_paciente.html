{% extends "base.html" %}
{% block content %}
<h1>Editar Paciente</h1>

<div class="card">
  <form method="POST">
    <label>Nome completo</label>
    <input type="text" name="nome" required value="{{ paciente.nome }}">

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div>
        <label>Telefone</label>
        <input type="text" name="telefone" required value="{{ paciente.telefone }}">
      </div>
      <div>
        <label>CPF</label>
        <input type="text" name="cpf" value="{{ paciente.cpf }}">
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div>
        <label>Email</label>
        <input type="email" name="email" value="{{ paciente.email }}">
      </div>
      <div>
        <label>Data de nascimento</label>
        <input type="date" name="data_nascimento" required value="{{ paciente.data_nascimento.isoformat() }}">
      </div>
    </div>

    <label>Endereço</label>
    <input type="text" name="endereco" value="{{ paciente.endereco }}">

    <label>Observações</label>
    <textarea name="observacoes" rows="3">{{ paciente.observacoes }}</textarea>

    <button type="submit" class="btn btn-primary">Salvar alterações</button>
    <a href="/pacientes" style="margin-left:12px; color:#888; font-size:0.9rem;">Cancelar</a>
  </form>
</div>
{% endblock %}
